services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: elio-timescaledb
    environment:
      POSTGRES_DB: elio
      POSTGRES_USER: elio
      POSTGRES_PASSWORD: elio
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.8
    container_name: elio-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - redpanda:8082
    ports:
      - "9092:9092"
      - "8082:8082"

  redis:
    image: redis:7-alpine
    container_name: elio-redis
    ports:
      - "6379:6379"

volumes:
  timescaledb-data:
